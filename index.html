    <style>
        /* 基礎設定：確保間距計算正確 */
        * { box-sizing: border-box; }

        body { 
            background-color: #f7f3ee; 
            font-family: "Noto Sans TC", sans-serif; 
            line-height: 1.6; 
            color: #333; 
            margin: 0; 
            padding: 10px; 
        }

        /* 響應式容器：電腦端 800px，手機端自動縮放 */
        .page { 
            max-width: 800px; 
            width: 95%;
            margin: 20px auto; 
            padding: 30px; 
            display: none; 
            background: white; 
            border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);

        /* 標題字體響應式調整 */
        h1 { font-size: 1.8rem; }
        h2 { font-size: 1.5rem; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .columns { display: flex; gap: 20px; flex-wrap: wrap; }
        .column { flex: 1; min-width: 250px; background: #fffaf0; padding: 15px; border-radius: 10px; }

        /* 選項與間距：保持你原始碼的設定 */
        label { display: block; margin: 8px 0; cursor: pointer; font-size: 15px; }
        label:hover { color: #8b4513; }

        /* 按鈕更新：圓角形狀與浮動效果 */
        button { 
            display: inline-block; 
            margin: 10px; 
            padding: 12px 30px; 
            font-size: 16px; 
            font-weight: bold;
            cursor: pointer; 
            border: none; 
            border-radius: 50px; /* 圓角梭形 */
            background-color: #8b4513; 
            color: white; 
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* 按鈕浮動效果：滑鼠移入時上移並加深陰影 */
        button:hover { 
            background-color: #a0522d; 
            transform: translateY(-3px); 
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }
        
        /* 按鈕點擊感 */
        button:active {
            transform: translateY(-1px);
        }

        .btn-container { text-align: center; margin-top: 20px; }
        #result-box { background: #fdf5e6; padding: 20px; border-radius: 10px; margin-top: 20px; border: 1px solid #e6dccf; }

        /* 手機端微調：確保內容不擁擠 */
        @media (max-width: 600px) {
            .page { padding: 20px; margin: 10px auto; }
            .column { min-width: 100%; }
            button { width: 80%; } /* 手機端按鈕稍微加寬好按 */
        }
    </style>
</head>

<div class="page" id="page4">

    <div id="result-box">
        <p id="result" style="text-align:center; font-size: 20px; font-weight: bold; color: #8b4513;"></p>
    </div>
    <div class="btn-container">
        <button onclick="location.reload()">再玩一次</button>
    </div>
</div>

<script>
    const jobNames = {
        "R1": "學術研究",
        "R2": "台語文教育",
        "R3": "語文媒體傳播",
        "R4": "文化創意行銷",
        "R5": "文藝內容創作",
        "R6": "文史推廣與文化行政",
        "R7": "國際傳播交流"
    };

    let scores = { R1:0, R2:0, R3:0, R4:0, R5:0, R6:0, R7:0 };

    document.querySelectorAll("input[type=checkbox]").forEach(cb => {
        cb.addEventListener("change", function() {
            let data = JSON.parse(this.dataset.score);
            for (let key in data) {
                if (this.checked) {
                    scores[key] += data[key];
                } else {
                    scores[key] -= data[key];
                }
            }
        });
    });

    function nextPage(n) {
        document.querySelectorAll(".page").forEach(p => p.classList.remove("show"));
        document.getElementById("page" + n).classList.add("show");
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function showResult() {
        nextPage(4);
        let sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
        let firstJob = jobNames[sorted[0][0]];
        let secondJob = jobNames[sorted[1][0]];
        
        document.getElementById("result").innerHTML = `
            🥇 主要適合：${firstJob}<br>
            ✨ 次要潛力：${secondJob}<br>
            <span style="font-size:14px; color:#666; font-weight:normal;">(根據你的選擇，${firstJob} 的權重最高！)</span>
        `;
    }
</script>
