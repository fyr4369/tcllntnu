/* ===============================
   全域設定
================================ */
* { box-sizing: border-box; }

body {
  background-color: #f7f3ee;
  font-family: "Noto Sans TC", sans-serif;
  margin: 0;
  padding: 10px;
  color: #333;
}

/* ===============================
   頁面區塊
================================ */
.page {
  max-width: 600px;
  margin: 30px auto;
  padding: 30px;
  background: white;
  border-radius: 15px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);

}

.show { display: block; }

/* ===============================

================================ */
.columns {

  flex-wrap: wrap;
}

.column {

  min-width: 250px;
}

/* ===============================

================================ */
label {

  margin: 8px 0;
  font-size: 14px;
}

/* ===============================
   按鈕圓角形狀與浮動效果
================================ */
button {
  padding: 10px 25px;
  margin: 10px;
  border: none;
  border-radius: 50px;
  background-color: #8b4513;
  color: white;
  font-size: 15px;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 12px rgba(0,0,0,0.2);
}

.btn-container {
  text-align: center;
}

/* ===============================
   結果頁樣式
================================ */

.result-title {
  font-size: 26px;
  font-weight: bold;
  color: #8b4513;
  text-align: center;
}

}

}

.career-title {

  margin-bottom: 8px;
  color: #6b3e1e;
}

.career-list li {
  margin: 6px 0;

</style>

<!-- ===============================

<script>

/* ===============================
   各類型名稱
================================ */
const jobNames = {
  R1:"學術研究",
  R2:"台語文教育",
  R3:"語文媒體傳播",
  R4:"文化創意行銷",
  R5:"文藝內容創作",
  R6:"文史推廣與文化行政",
  R7:"國際傳播交流"
};

/* ===============================
   結果說明
================================ */
const jobDescriptions = {

R1:`
<div class="type-desc">
你重視理論與文本分析，適合長期研究與知識建構。
</div>
<div class="career-block">
<div class="career-title">🔬 可能職涯方向</div>
<ul class="career-list">
<li>大專院校教授</li>

</ul>
</div>`,

R2:`

</div>

R6:`

</ul>
</div>`,

R7:`
<div class="type-desc">
你擅長跨文化與國際交流。
</div>
<div class="career-block">
<div class="career-title">🌏 可能職涯方向</div>
<ul class="career-list">
<li>國際文化交流人員</li>
<li>台灣文學外譯出版</li>
<li>學界國際專員</li>
</ul>
</div>`
};

/* ===============================
   重新計算機制（解決重複計分問題）
================================ */
function calculateScores(){
  let scores={R1:0,R2:0,R3:0,R4:0,R5:0,R6:0,R7:0};

  document.querySelectorAll("input[type=checkbox]:checked").forEach(cb=>{
    let data=JSON.parse(cb.dataset.score);
    for(let key in data){
      scores[key]+=data[key];
    }
  });

  return scores;
}

/* ===============================
   頁面切換
================================ */
function nextPage(n){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("show"));
  document.getElementById("page"+n).classList.add("show");
  window.scrollTo({top:0,behavior:'smooth'});
}

/* ===============================
   顯示結果
================================ */
function showResult(){
  nextPage(4);

  const scores=calculateScores();
  const sorted=Object.entries(scores).sort((a,b)=>b[1]-a[1]);

  document.getElementById("result").innerHTML=`
  <div class="result-title">🥇 ${jobNames[sorted[0][0]]}</div>
  <div class="result-sub">你的核心台文職涯輪廓</div>
  ${jobDescriptions[sorted[0][0]]}
  <hr>
  <div class="result-sub">
  ✨ 同時具有 ${jobNames[sorted[1][0]]} 的潛力
  </div>
  `;
}

</script>
