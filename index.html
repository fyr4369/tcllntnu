 <!DOCTYPE html>

<html lang="zh-Hant">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>台文特有種，你是哪一種</title>

    <style>

        /* [核心樣式] */

        * { box-sizing: border-box; }

        body { background-color: #f7f3ee; font-family: "Noto Sans TC", sans-serif; line-height: 1.6; color: #333; margin: 0; padding: 10px; }

        .page { max-width: 950px; width: 95%; margin: 20px auto; padding: 35px; display: none; background: white; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }

        .show { display: block; animation: fadeIn 0.4s; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }


        /* [卡片化選項：增加遊戲感] */

        .columns { display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 20px; }

        .column { flex: 1; min-width: 280px; background: #fffaf0; padding: 20px; border-radius: 18px; border: 1px solid #f0e6d2; }

        .column h3 { text-align: center; color: #8b4513; border-bottom: 2px solid #e0d5ba; padding-bottom: 8px; margin-top: 0; font-size: 1.1em; }

        

        /* 選項標籤改為卡片樣式 */

        label { 

            display: flex; align-items: center; margin: 8px 0; padding: 10px 15px;

            cursor: pointer; font-size: 14px; border-radius: 10px;

            background: white; border: 1px solid #e0d8cf;

            transition: all 0.2s ease; user-select: none;

        }

        /* 游標移過去的效果 */

        label:hover { background: #fdf5e6; border-color: #d2b48c; transform: translateX(3px); }

        

        /* 隱藏原生勾選框 */

        input[type="checkbox"] { display: none; }


        /* 選取後的呈現模式：維持淡米色底 */

        label:has(input:checked) { 

            background: #fdf5e6; 

            border: 2px solid #8b4513;

            box-shadow: 0 2px 8px rgba(139, 69, 19, 0.1);

        }

        label:has(input:checked) span { font-weight: bold; color: #5a2e13; }

        label:has(input:checked) span::before { content: "✓ "; color: #8b4513; margin-right: 5px; }


        /* [按鈕設計：形狀一致，顏色區隔] */

        .btn-container { text-align: center; margin-top: 30px; display: flex; justify-content: center; gap: 15px; }

        button { 

            padding: 12px 35px; font-size: 16px; font-weight: bold; cursor: pointer; 

            border: none; border-radius: 50px; transition: 0.3s; min-width: 160px;

        }

        .btn-next { background: #8b4513; color: white; }

        .btn-next:hover { background: #5a2e13; transform: translateY(-2px); }

        

        .btn-prev { background: #e0d8cf; color: #7a5a40; } /* 較淺的顏色 */

        .btn-prev:hover { background: #d2b48c; transform: translateY(-2px); }


        /* [結果顯示區樣式] */

        .result-card { background: #ffffff; padding: 30px; border-radius: 20px; margin-bottom: 25px; border: 1px solid #e0d8cf; }

        .result-card.primary { border-top: 8px solid #8b4513; }

        .result-card.secondary { border-top: 8px solid #d2b48c; }

        .badge { display: inline-block; font-size: 12px; color: #8b4513; background: #fdf5e6; padding: 4px 12px; border-radius: 50px; font-weight: bold; margin-bottom: 15px; }

        .result-title { font-size: 24px; font-weight: bold; color: #5a2e13; margin-bottom: 10px; }

        .career-box { background: #fcfaf7; border: 1.5px dashed #d2b48c; padding: 20px; border-radius: 12px; margin-top: 15px; }

        .career-box ul { margin: 0; padding-left: 20px; column-count: 2; }


        @media (max-width: 600px) { .columns { flex-direction: column; } .career-box ul { column-count: 1; } }

    </style>

</head>

            <label><input type="checkbox" data-score='{"R1":3,"R2":1,"R3":1,"R4":1,"R5":3,"R6":2,"R7":1}'><span>文學概論</span></label>

            <label><input type="checkbox" data-score='{"R1":2,"R2":1,"R3":1,"R4":2,"R5":3,"R6":1,"R7":1}'><span>台灣現代文學選</span></label>

            <label><input type="checkbox" data-score='{"R1":1,"R2":3,"R3":0,"R4":1,"R5":2,"R6":0,"R7":0}'><span>台語詩/散文/小說選</span></label>

            <label><input type="checkbox" data-score='{"R1":1,"R2":3,"R3":1,"R4":1,"R5":2,"R6":1,"R7":1}'><span>台語民間文學選</span></label>

            <label><input type="checkbox" data-score='{"R1":1,"R2":0,"R3":0,"R4":1,"R5":1,"R6":1,"R7":0}'><span>台灣飲食文學</span></label>

            <label><input type="checkbox" data-score='{"R1":2,"R2":0,"R3":1,"R4":1,"R5":2,"R6":1,"R7":1}'><span>台灣後殖民文學</span></label>

            <label><input type="checkbox" data-score='{"R1":3,"R2":0,"R3":0,"R4":2,"R5":2,"R6":2,"R7":1}'><span>文學社會學</span></label>

        </div>

    </div>

    <div class="btn-container">

        <button class="btn-prev" onclick="nextPage(0)">返回封面</button>

        <button class="btn-next" onclick="nextPage(2)">下一步｜應用課程</button>

    </div>

</div>

    <h2 style="text-align:center;">STEP 2｜進階應用課程</h2>

    <div style="max-width: 600px; margin: 0 auto;">

        <label><input type="checkbox" data-score='{"R4":7}'><span>台灣文化創意產業</span></label>

        <label><input type="checkbox" data-score='{"R3":7,"R4":3,"R5":3}'><span>採訪寫作與媒體傳播</span></label>

        <label><input type="checkbox" data-score='{"R1":7,"R6":3}'><span>學術閱讀與寫作</span></label>

</div>


<div class="page" id="page3">

    <h2 style="text-align:center;">STEP 3｜外加資源 (加值星星)</h2>

    <div style="max-width: 600px; margin: 0 auto;">

        <label><input type="checkbox" data-score='{"R1":5,"R7":8}'><span>修習幾門全英語授課</span></label>

        <label><input type="checkbox" data-score='{"R7":8,"R1":5}'><span>赴國外交換</span></label>

        <label><input type="checkbox" data-score='{"R4":8,"R5":5}'><span>產業實習-出版業</span></label>

<div class="page" id="page4">

    <h1 style="text-align:center;">你的台文未來角色</h1>

    <div id="result-area"></div>

    <div class="btn-container"><button class="btn-next" onclick="location.reload()">再玩一次</button></div>

</div>


<script>

    const jobData = {

        "R1": { name: "學術研究", desc: "你具備學術研究的興趣與邏輯思考能力，能透過嚴謹的閱讀與研究，為台灣文化建立紮實的知識體系。", careers: ["大學教授 / 專案研究員", "中研院助理", "文史研究專家"] },

        "R2": { name: "台語文教育", desc: "你對擔任中小學師資有興趣，也重視母語的傳傳，試圖將語言知識化為淺顯易懂的內容，為本土語文向下扎根。", careers: ["中小學台語教師","台語教材編輯","台語教材出版行銷","台語檢定出題審題"] },

        "R3": { name: "語文媒體傳播", desc: "你對傳播媒體有興趣，也具有流暢的口才或優秀的溝通能力，能將各種內容透過多元的媒體形式，傳達給受眾。", careers: ["新聞主播、記者","電台主持、播音配音","節目企劃製作","台語翻譯顧問"] },

        "R4": { name: "文化創意行銷", desc: "你擁有靈活的思維與豐富的創意，期許將既有的台灣文化知識及元素，重新轉譯再製，創造具台灣特色的產值。", careers: ["文創產品企劃","文化轉譯設計","新興出版產業","獨立書店經營"] },

        "R5": { name: "文藝內容創作", desc: "你擁有豐富的感受力與文字敏感度，期望提升台語文的美學層次，並落實於文學或藝術創作之中。", careers: ["文學創作","圖文繪本創作","影視戲劇編劇"] },

        "R6": { name: "文史推廣與文化行政", desc: "你擅長資料的彙整與資源的整合，能在大眾與藝文之間、政府與民眾之間搭建橋樑，推動各項文化保存工作。", careers: ["博物館/文學館員","地方文史工作者","文化教育行政","文化內容策展"] },

        "R7": { name: "國際傳播交流", desc: "你擁有跨語言優勢，也具備國際視野，喜歡將台灣的獨理性介紹給來自不同國度的人們。", careers: ["對外文化推廣傳播","台灣文學外譯出版","學界國際專員","外語導覽員"] }

    };


    let scores = { R1:0, R2:0, R3:0, R4:0, R5:0, R6:0, R7:0 };


    // [運算邏輯]

    document.querySelectorAll("input[type=checkbox]").forEach(cb => {

        cb.addEventListener("change", function() {

            const val = JSON.parse(this.dataset.score);

            for (let k in val) { scores[k] += this.checked ? val[k] : -val[k]; }

        });

    });


    function nextPage(n) {

        document.querySelectorAll(".page").forEach(p => p.classList.remove("show"));

        document.getElementById("page" + n).classList.add("show");

        window.scrollTo(0, 0);

    }


    function showResult() {

        nextPage(4);

        const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);

        const first = jobData[sorted[0][0]];

        const second = jobData[sorted[1][0]];

        

        document.getElementById("result-area").innerHTML = `

            <div class="result-card primary">

                <span class="badge">你的核心職涯輪廓</span>

                <div class="result-title">🥇 ${first.name}</div>

                <p>${first.desc}</p>

                <div class="career-box"><strong>🏛️ 發展方向：</strong><ul>${first.careers.map(c => `<li>${c}</li>`).join('')}</ul></div>

            </div>

            <div class="result-card secondary">

                <span class="badge">你的次要潛力發展</span>

                <div class="result-title">✨ ${second.name}</div>

                <p>${second.desc}</p>

                <div class="career-box"><strong>💼 發展方向：</strong><ul>${second.careers.map(c => `<li>${c}</li>`).join('')}</ul></div>

            </div>`;

    }

</script>
