<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台文特有種，你是哪一種</title>
    <style>
        /* [核心樣式：優化視覺但不更動邏輯] */
        * { box-sizing: border-box; }
        body { background-color: #f7f3ee; font-family: "Noto Sans TC", sans-serif; line-height: 1.6; color: #333; margin: 0; padding: 10px; }
        .page { max-width: 900px; width: 95%; margin: 20px auto; padding: 35px; display: none; background: white; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .show { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* [選項排版：還原三欄結構] */
        .columns { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 20px; }
        .column { flex: 1; min-width: 250px; background: #fffaf0; padding: 20px; border-radius: 12px; border: 1px solid #eee; }
        .column h3 { text-align: center; color: #8b4513; border-bottom: 2px solid #e0d5ba; padding-bottom: 8px; margin-top: 0; }
        label { display: flex; align-items: flex-start; margin: 10px 0; cursor: pointer; font-size: 14.5px; transition: 0.2s; }
        label:hover { color: #8b4513; }
        input[type="checkbox"] { margin-right: 10px; margin-top: 4px; accent-color: #8b4513; transform: scale(1.1); }

        /* [結果卡片：設計感升級] */
        .result-card { background: #ffffff; padding: 30px; border-radius: 20px; margin-bottom: 25px; border: 1px solid #e0d8cf; position: relative; }
        .result-card.primary { border-top: 8px solid #8b4513; }
        .result-card.secondary { border-top: 8px solid #d2b48c; }
        .badge { display: inline-block; font-size: 12px; color: #8b4513; background: #fdf5e6; padding: 4px 12px; border-radius: 50px; font-weight: bold; margin-bottom: 15px; }
        .result-title { font-size: 24px; font-weight: bold; color: #5a2e13; margin-bottom: 10px; }
        .result-desc { font-size: 15.5px; line-height: 1.8; color: #555; margin-bottom: 20px; border-left: 3px solid #eee; padding-left: 15px; }
        .career-box { background: #fcfaf7; border: 1.5px dashed #d2b48c; padding: 20px; border-radius: 12px; }
        .career-box strong { color: #8b4513; font-size: 15px; display: block; margin-bottom: 10px; }
        .career-box ul { margin: 0; padding-left: 20px; column-count: 2; }
        .career-box li { font-size: 14px; margin: 4px 0; }

        /* [按鈕設計] */
        .btn-container { text-align: center; margin-top: 30px; }
        button { padding: 12px 35px; font-size: 16px; font-weight: bold; cursor: pointer; border: none; border-radius: 50px; background: #8b4513; color: white; transition: 0.3s; }
        button:hover { background: #5a2e13; transform: translateY(-2px); }
        .btn-prev { background: none; color: #8b4513; text-decoration: underline; box-shadow: none; margin-right: 15px; }

        @media (max-width: 600px) { .career-box ul { column-count: 1; } }
    </style>
</head>
<body>

<div class="page show" id="page0">
    <h1 style="text-align:center; font-size: 2.5em;">🎉 台文特有種，你是哪一種？ 🎉</h1>
    <p style="text-align:center; font-size: 1.2em;">快來看看台文系的課程與資源，<br>
發現你專屬的台文職涯路線！</p>
    <div class="btn-container"><button onclick="nextPage(1)">開始測驗</button></div>
</div>

<div class="page" id="page1">
    <h2 style="text-align:center;">STEP 1｜基礎課程</h2>
    <p style="text-align:center; color:#666;">選取你有興趣的課程吧！ (建議 6~8 門)</p>
    <div class="columns">
        <div class="column">
            <h3>🏛️ 文化</h3>
            <label><input type="checkbox" data-score='{"R1":2,"R2":2,"R3":2,"R4":2,"R5":2,"R6":3,"R7":2}'> 台灣文化史</label>
            <label><input type="checkbox" data-score='{"R1":3,"R2":1,"R3":1,"R4":2,"R5":1,"R6":3,"R7":1}'> 文化研究概論</label>
            <label><input type="checkbox" data-score='{"R1":1,"R2":1,"R3":2,"R4":1,"R5":1,"R6":2,"R7":1}'> 台灣紀錄片</label>
            <label><input type="checkbox" data-score='{"R1":1,"R2":2,"R3":1,"R4":1,"R5":2,"R6":1,"R7":1}'> 台語戲劇與電影</label>
            <label><input type="checkbox" data-score='{"R1":1,"R2":1,"R3":2,"R4":3,"R5":1,"R6":2,"R7":2}'> 台灣流行文化</label>
            <label><input type="checkbox" data-score='{"R1":1,"R2":1,"R3":1,"R4":1,"R5":1,"R6":1,"R7":1}'> 台灣飲食文化</label>
            <label><input type="checkbox" data-score='{"R1":1,"R2":1,"R3":1,"R4":1,"R5":1,"R6":1,"R7":1}'> 多元性別文化</label>
            <label><input type="checkbox" data-score='{"R1":2,"R2":1,"R3":1,"R4":1,"R5":1,"R6":2,"R7":3}'> 台灣與世界文化</label>
        </div>
        <div class="column">
            <h3>🗣️ 語言</h3>
            <label><input type="checkbox" data-score='{"R1":3,"R2":2,"R3":3,"R4":1,"R5":0,"R6":1,"R7":1}'> 語言學概論</label>
            <label><input type="checkbox" data-score='{"R1":1,"R2":3,"R3":3,"R4":1,"R5":1,"R6":2,"R7":1}'> 台語的口語表達</label>
            <label><input type="checkbox" data-score='{"R1":2,"R2":2,"R3":3,"R4":2,"R5":1,"R6":1,"R7":1}'> 台語翻譯</label>
            <label><input type="checkbox" data-score='{"R1":3,"R2":1,"R3":0,"R4":0,"R5":0,"R6":0,"R7":0}'> 語料庫入門</label>
            <label><input type="checkbox" data-score='{"R1":3,"R2":1,"R3":1,"R4":0,"R5":0,"R6":0,"R7":0}'> 語音紀錄與田野調查</label>
            <label><input type="checkbox" data-score='{"R1":1,"R2":2,"R3":1,"R4":1,"R5":0,"R6":0,"R7":0}'> 初級客語</label>
            <label><input type="checkbox" data-score='{"R1":1,"R2":1,"R3":0,"R4":1,"R5":0,"R6":0,"R7":0}'> 台灣南島語言</label>
            <label><input type="checkbox" data-score='{"R1":1,"R2":1,"R3":0,"R4":1,"R5":0,"R6":1,"R7":3}'> 初級日語</label>
        </div>
        <div class="column">
            <h3>📖 文學</h3>
            <label><input type="checkbox" data-score='{"R1":2,"R2":2,"R3":2,"R4":2,"R5":3,"R6":3,"R7":2}'> 台灣文學史</label>
            <label><input type="checkbox" data-score='{"R1":3,"R2":1,"R3":1,"R4":1,"R5":3,"R6":2,"R7":1}'> 文學概論</label>
            <label><input type="checkbox" data-score='{"R1":2,"R2":1,"R3":1,"R4":2,"R5":3,"R6":1,"R7":1}'> 台灣現代文學選</label>
            <label><input type="checkbox" data-score='{"R1":1,"R2":3,"R3":0,"R4":1,"R5":2,"R6":0,"R7":0}'> 台語詩/散文/小說選</label>
            <label><input type="checkbox" data-score='{"R1":1,"R2":3,"R3":1,"R4":1,"R5":2,"R6":1,"R7":1}'> 台語民間文學選</label>
            <label><input type="checkbox" data-score='{"R1":1,"R2":0,"R3":0,"R4":1,"R5":1,"R6":1,"R7":0}'> 台灣飲食文學</label>
            <label><input type="checkbox" data-score='{"R1":2,"R2":0,"R3":1,"R4":1,"R5":2,"R6":1,"R7":1}'> 台灣後殖民文學</label>
            <label><input type="checkbox" data-score='{"R1":3,"R2":0,"R3":0,"R4":2,"R5":2,"R6":2,"R7":1}'> 文學社會學</label>
        </div>
    </div>
    <div class="btn-container">
        <button onclick="nextPage(2)">下一步｜應用課程</button>
    </div>
</div>

<div class="page" id="page2">
    <h2 style="text-align:center;">STEP 2｜進階應用課程</h2>
    <p style="text-align:center; color:#666;">你想從哪些方向應用所學呢？ (建議 3~4 門)</p>
    <div style="max-width: 600px; margin: 0 auto; background:#fffaf0; padding:25px; border-radius:12px;">
        <label><input type="checkbox" data-score='{"R4":7}'> 台灣文化創意產業</label>
        <label><input type="checkbox" data-score='{"R3":7,"R4":3,"R5":3}'> 採訪寫作與媒體傳播</label>
        <label><input type="checkbox" data-score='{"R2":3,"R3":3,"R5":7}'> 多媒體台語文創作</label>
        <label><input type="checkbox" data-score='{"R4":3,"R5":7}'> 台灣文學繪本應用與創作</label>
        <label><input type="checkbox" data-score='{"R3":7,"R7":3}'> 新聞台語</label>
        <label><input type="checkbox" data-score='{"R2":3,"R3":7}'> 職場台語</label>
        <label><input type="checkbox" data-score='{"R2":7}'> 台語教材教法</label>
        <label><input type="checkbox" data-score='{"R1":3,"R6":7}'> 社區文化資產與當代台灣文化</label>
        <label><input type="checkbox" data-score='{"R1":7,"R6":3}'> 學術閱讀與寫作</label>
        <label><input type="checkbox" data-score='{"R1":3,"R7":7}'> 英文台灣文獻</label>
    </div>
    <div class="btn-container">
        <button class="btn-prev" onclick="nextPage(1)">返回基礎課程</button>
        <button onclick="nextPage(3)">下一步｜外加資源</button>
    </div>
</div>

<div class="page" id="page3">
    <h2 style="text-align:center;">STEP 3｜外加資源 (加值星星)</h2>
    <p style="text-align:center; color:#666;">大學四年你最不想錯過哪些機會呢？ (最多選 3 項)</p>
    <div style="max-width: 600px; margin: 0 auto; background:#fffaf0; padding:25px; border-radius:12px;">
        <label><input type="checkbox" data-score='{"R1":5,"R7":8}'> 修習幾門全英語授課</label>
        <label><input type="checkbox" data-score='{"R7":8,"R1":5}'> 赴國外交換</label>
        <label><input type="checkbox" data-score='{"R2":8,"R6":3}'> 修習教育學程</label>
        <label><input type="checkbox" data-score='{"R3":5,"R4":8}'> 修習數位相關學程</label>
        <label><input type="checkbox" data-score='{"R1":8,"R6":5}'> 申請研究補助</label>
        <label><input type="checkbox" data-score='{"R2":8,"R3":5}'> 考取台語檢定</label>
        <label><input type="checkbox" data-score='{"R5":8,"R4":3}'> 參加校內外文學獎</label>
        <label><input type="checkbox" data-score='{"R3":8,"R4":5}'> 產業實習-電視台、廣播電台</label>
        <label><input type="checkbox" data-score='{"R3":5,"R5":5}'> 產業實習-電影編導公司</label>
        <label><input type="checkbox" data-score='{"R4":8,"R5":5}'> 產業實習-出版業</label>
        <label><input type="checkbox" data-score='{"R6":8,"R1":5}'> 產業實習-博物館</label>
    </div>
    <div class="btn-container">
        <button class="btn-prev" onclick="nextPage(2)">返回進階課程</button>
        <button onclick="showResult()">看看報告結果</button>
    </div>
</div>

<div class="page" id="page4">
    <h1 style="text-align:center;">你的台文未來角色</h1>
    <div id="result-area"></div>
    <div class="btn-container"><button onclick="location.reload()">再玩一次</button></div>
</div>

<script>
    // [資料庫]：嚴謹校對 R1-R7
    const jobData = {
        "R1": { name: "學術研究", desc: "你具備學術研究的興趣與邏輯思考能力，能透過嚴謹的閱讀與研究，為台灣文化建立紮實的知識體系。", careers: ["大學教授 / 專案研究員", "中研院助理", "文史研究專家"] },
        "R2": { name: "台語文教育", desc: "你對擔任中小學師資有興趣，也重視母語的傳承，試圖將語言知識化為淺顯易懂的內容，為本土語文向下扎根。", careers: ["中小學台語教師","台語教材編輯","台語教材出版行銷","台語檢定出題審題"] },
        "R3": { name: "語文媒體傳播", desc: "你對傳播媒體有興趣，也具有流暢的口才或優秀的溝通能力，能將各種內容透過多元的媒體形式，傳達給受眾。", careers: ["新聞主播、記者","電台主持、播音配音","節目企劃製作","台語翻譯顧問"] },
        "R4": { name: "文化創意行銷", desc: "你擁有靈活的思維與豐富的創意，期許將既有的台灣文化知識及元素，重新轉譯再製，創造具台灣特色的產值。", careers: ["文創產品企劃","文化轉譯設計","新興出版產業","獨立書店經營"] },
        "R5": { name: "文藝內容創作", desc: "你擁有豐富的感受力與文字敏感度，期望提升台語文的美學層次，並落實於文學或藝術創作之中。", careers: ["文學創作","圖文繪本創作","影視戲劇編劇"] },
        "R6": { name: "文史推廣與文化行政", desc: "你擅長資料的彙整與資源的整合，能在大眾與藝文之間、政府與民眾之間搭建橋樑，推動各項文化保存工作。", careers: ["博物館/文學館員","地方文史工作者","文化教育行政人","策展人"] },
        "R7": { name: "國際傳播交流", desc: "你擁有跨語言優勢，也具備國際視野，喜歡將台灣的獨特性介紹給來自不同國度的人們。", careers: ["對外文化推廣傳播","台灣文學外譯出版","學界國際專員","外語導覽員"] }
    };

    let scores = { R1:0, R2:0, R3:0, R4:0, R5:0, R6:0, R7:0 };

    // [運算邏輯]
    document.querySelectorAll("input[type=checkbox]").forEach(cb => {
        cb.addEventListener("change", function() {
            const val = JSON.parse(this.dataset.score);
            for (let k in val) { scores[k] += this.checked ? val[k] : -val[k]; }
        });
    });

    function nextPage(n) {
        document.querySelectorAll(".page").forEach(p => p.classList.remove("show"));
        document.getElementById("page" + n).classList.add("show");
        window.scrollTo(0, 0);
    }

    // [顯示邏輯]
    function showResult() {
        nextPage(4);
        const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
        const first = jobData[sorted[0][0]];
        const second = jobData[sorted[1][0]];
        
        document.getElementById("result-area").innerHTML = `
            <div class="result-card primary">
                <span class="badge">你的核心職涯輪廓</span>
                <div class="result-title">🥇 ${first.name}</div>
                <p class="result-desc">${first.desc}</p>
                <div class="career-box">
                    <strong>🏛️ 可以發展的職涯方向：</strong>
                    <ul>${first.careers.map(c => `<li>${c}</li>`).join('')}</ul>
                </div>
            </div>
            <div class="result-card secondary">
                <span class="badge">你的次要潛力發展</span>
                <div class="result-title">✨ ${second.name}</div>
                <p class="result-desc">${second.desc}</p>
                <div class="career-box">
                    <strong>💼 可以發展的職涯方向：</strong>
                    <ul>${second.careers.map(c => `<li>${c}</li>`).join('')}</ul>
                </div>
            </div>
        `;
    }
</script>
</body>
</html>
